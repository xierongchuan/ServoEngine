services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PANEL_PORT:-8080}:8080"
    security_opt:
      - label:disable
    volumes:
      - ../../data:/app/data:rw
      - ../../charts:/app/charts:ro
      - ../../bot_config.json:/app/bot_config.json:rw
      - ../../src:/app/src:ro
      - ../../.env:/app/.env:ro
    env_file: ../../.env
    environment:
      - PANEL_PORT=8080
      - PANEL_DATA_DIR=/app/data
      - PANEL_CHARTS_DIR=/app/charts
      - PANEL_CONFIG_PATH=/app/bot_config.json
      - TELEGRAM_PANEL_URL=${TELEGRAM_PANEL_URL:-}
    restart: unless-stopped
